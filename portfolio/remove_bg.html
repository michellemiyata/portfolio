<!DOCTYPE html>
<html>

<body>
    <img id="source" src="miyata_logo.png" style="display:none;">
    <canvas id="canvas"></canvas>
    <textarea id="output"></textarea>
    <script>
        const img = document.getElementById('source');
        img.onload = () => {
            try {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                // The original image is 1024x1024.
                // We crop down to just the logo content.
                const cropX = 100, cropY = 400, cropW = 824, cropH = 200;
                canvas.width = cropW;
                canvas.height = cropH;

                // Draw cropped section
                ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                // Convert white pixels to transparent
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] > 240 && data[i + 1] > 240 && data[i + 2] > 240) {
                        data[i + 3] = 0;
                    }
                }

                ctx.putImageData(imgData, 0, 0);
                document.getElementById('output').value = canvas.toDataURL("image/png");
            } catch (e) {
                document.getElementById('output').value = "ERROR: " + e.message;
            }
        };
    </script>
</body>

</html>
